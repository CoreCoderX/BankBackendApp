<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>DVEIN Bank</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/css/customer.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>
<div class="d-flex justify-content-between align-items-center mb-3">

    <h4>Hi, Novin 👋</h4>

    <a href="/" class="btn btn-danger btn-sm">
        Logout
    </a>

</div>

<div class="container-fluid p-3">

    <div class="balance-card">

        <div class="d-flex justify-content-between">

            <div>
                <small>SAVINGS ACCOUNT</small>

                <h2>₹45,000</h2>

                <p>**** **** 1234</p>
            </div>

            <div>
                <i class="fa-solid fa-building-columns fa-2x"></i>
            </div>

        </div>

    </div>

    <h5 class="section-title">
        Quick Actions
    </h5>

    <div class="row g-3">

        <div class="col-4">
            <a href="/customer/transfer" class="text-decoration-none">
                <div class="action-card">
                    <i class="fa-solid fa-money-bill-transfer"></i>
                    <p>Transfer</p>
                </div>
            </a>
        </div>

        <div class="col-4">
            <div class="action-card">
                <i class="fa-solid fa-file-invoice"></i>
                <p>Statement</p>
            </div>
        </div>

        <div class="col-4">
            <div class="action-card">
                <i class="fa-solid fa-qrcode"></i>
                <p>Scan</p>
            </div>
        </div>

        <div class="col-4">
            <a href="/customer/loans" class="text-decoration-none text-dark">
                <div class="action-card">
                    <i class="fa-solid fa-building-columns"></i>
                    <p>Loan</p>
                </div>
            </a>
        </div>

        <div class="col-4">
            <div class="action-card">
                <i class="fa-solid fa-repeat"></i>
                <p>NEFT</p>
            </div>
        </div>

        <div class="col-4">
            <a href="/customer/profile" class="text-decoration-none">
                <div class="action-card">
                    <i class="fa-solid fa-user"></i>
                    <p>Profile</p>
                </div>
            </a>
        </div>

    </div>

    <h5 class="section-title mt-4">
        Recent Transactions
    </h5>

    <div class="transaction-card">

        <div class="transaction-row">
            <span>Salary Credit</span>
            <span class="credit">+₹20,000</span>
        </div>

        <div class="transaction-row">
            <span>Amazon</span>
            <span class="debit">-₹1,200</span>
        </div>

        <div class="transaction-row">
            <span>Recharge</span>
            <span class="debit">-₹399</span>
        </div>

    </div>

</div>

<div class="bottom-nav">

    <a href="/customer/home" class="text-decoration-none">
        <div>
            <i class="fa-solid fa-house"></i>
            <p>Home</p>
        </div>
    </a>

    <a href="/customer/transfer" class="text-decoration-none">
        <div class="action-card">
            <i class="fa-solid fa-money-bill-transfer"></i>
            <p>Transfer</p>
        </div>
    </a>

    <a href="/customer/loans" class="text-decoration-none text-dark">
        <div class="action-card">
            <i class="fa-solid fa-building-columns"></i>
            <p>Loan</p>
        </div>
    </a>

    <a href="/customer/profile" class="text-decoration-none">
        <div class="action-card">
            <i class="fa-solid fa-user"></i>
            <p>Profile</p>
        </div>
    </a>

</div>

</body>
</html>
