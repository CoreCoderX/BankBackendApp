<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loans</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/customer.css">


</head>
<body>

<div class="mb-3">

    <a href="/customer/home"
       class="btn btn-outline-success">

        <i class="fa-solid fa-arrow-left"></i>
        Back

    </a>

</div>
<div class="container mt-4">


    <h3 class="mb-4">Loan Services</h3>

    <div class="row g-3">

        <div class="col-md-6">
            <div class="card shadow-sm p-3">
                <h5>🏠 Home Loan</h5>
                <p>Interest starts from 8.5%</p>
                <button class="btn btn-success">
                    Apply Now
                </button>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm p-3">
                <h5>🚗 Vehicle Loan</h5>
                <p>Interest starts from 9%</p>
                <button class="btn btn-success">
                    Apply Now
                </button>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm p-3">
                <h5>🎓 Education Loan</h5>
                <p>Interest starts from 7.5%</p>
                <button class="btn btn-success">
                    Apply Now
                </button>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm p-3">
                <h5>💼 Personal Loan</h5>
                <p>Interest starts from 10%</p>
                <button class="btn btn-success">
                    Apply Now
                </button>
            </div>
        </div>

    </div>

    <div class="card mt-4 shadow-sm">

        <div class="card-body">

            <h5>My Active Loan</h5>

            <p>Loan ID : LN001</p>
            <p>Amount : ₹5,00,000</p>
            <p>EMI : ₹12,500</p>

            <span class="badge bg-success">
            Approved
        </span>

        </div>

    </div>


</div>


</body>
</html>
