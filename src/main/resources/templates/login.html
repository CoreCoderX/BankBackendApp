<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVEIN Bank Login</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-card{
            width:400px;
            background:white;
            padding:30px;
            border-radius:20px;
            box-shadow:0 5px 20px rgba(0,0,0,.15);
        }

        .logo{
            text-align:center;
            color:#0b8f48;
            margin-bottom:20px;
        }

    </style>


</head>
<body>

<div class="login-card">


    <div class="logo">
        <h2>🏦 DVEIN BANK</h2>
        <p>Smart Digital Banking</p>
    </div>

    <form onsubmit="login(event)">

        <div class="mb-3">
            <input type="email"
                   id="email"
                   class="form-control"
                   placeholder="Email">
        </div>

        <div class="mb-3">
            <input type="password"
                   id="password"
                   class="form-control"
                   placeholder="Password">
        </div>

        <button class="btn btn-success w-100">
            Login
        </button>

    </form>

    <hr>

    <small>
        Admin:
        admin@dveinbank.com / admin123
    </small>

    <br>

    <small>
        Customer:
        customer@dveinbank.com / customer123
    </small>


</div>

<script>

    function login(event){

        event.preventDefault();

        const email =
            document.getElementById("email").value;

        const password =
            document.getElementById("password").value;

        if(
            email==="admin@dveinbank.com"
            &&
            password==="admin123"
        ){
            window.location.href=
                "/admin/dashboard";
        }

        else if(
            email==="customer@dveinbank.com"
            &&
            password==="customer123"
        ){
            window.location.href=
                "/customer/home";
        }

        else{

            alert(
                "Invalid Credentials"
            );
        }
    }

</script>

</body>
</html>
