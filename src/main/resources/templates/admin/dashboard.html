<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVEIN Admin Portal</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">


</head>
<body style="background:#f4f6f9;">

<div class="d-flex justify-content-between align-items-center mb-4">

    <h2>🏦 DVEIN BANK ADMIN</h2>

    <a href="/" class="btn btn-danger">
        Logout
    </a>

</div>

<div class="container mt-4">

    <div class="row g-3 mt-2">

        <div class="col-md-3">
            <div class="card bg-primary text-white p-3">
                <h5>Customers</h5>
                <h2>12,450</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-success text-white p-3">
                <h5>Accounts</h5>
                <h2>18,230</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-warning text-white p-3">
                <h5>Transactions</h5>
                <h2>125,000</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-danger text-white p-3">
                <h5>Loans</h5>
                <h2>2,450</h2>
            </div>
        </div>

    </div>

    <div class="card mt-4 shadow-sm">

        <div class="card-body">

            <h4>Recent Alerts</h4>

            <ul>
                <li>15 Blocked Accounts</li>
                <li>120 Pending Loans</li>
                <li>3 Suspicious Transactions</li>
            </ul>

        </div>

    </div>

    <div class="mt-4">

        <a href="/admin/reports" class="btn btn-primary">
            Reports
        </a>

        <a href="/admin/analytics" class="btn btn-success">
            Analytics
        </a>

    </div>


</div>

</body>
</html>
