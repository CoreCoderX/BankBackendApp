<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


</head>
<body style="background:#f4f6f9;">
<div class="mb-3">
<a href="/admin/dashboard"
   class="btn btn-outline-primary">

    <i class="fa-solid fa-arrow-left"></i>
    Back

</a>
<div class="container mt-4">


    <h2>📊 Banking Analytics</h2>

    <div class="row mt-4">

        <div class="col-md-6">

            <div class="card shadow-sm">

                <div class="card-body">

                    <h5>Monthly Transactions</h5>

                    <canvas id="transactionChart"></canvas>

                </div>

            </div>

        </div>

        <div class="col-md-6">

            <div class="card shadow-sm">

                <div class="card-body">

                    <h5>Loan Applications</h5>

                    <canvas id="loanChart"></canvas>

                </div>

            </div>

        </div>

    </div>

    <div class="row mt-4">

        <div class="col-md-4">

            <div class="card text-center bg-primary text-white p-3">

                <h5>Total Customers</h5>
                <h2>12,450</h2>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card text-center bg-success text-white p-3">

                <h5>Total Accounts</h5>
                <h2>18,230</h2>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card text-center bg-danger text-white p-3">

                <h5>Total Loans</h5>
                <h2>2,450</h2>

            </div>

        </div>

    </div>


</div>


<script>

    const transactionChart = document.getElementById('transactionChart');

    new Chart(transactionChart, {
        type: 'bar',
        data: {
            labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
            datasets: [{
                label: 'Transactions',
                data: [1200, 1800, 2400, 3100, 2800, 3500]
            }]
        }
    });

    const loanChart = document.getElementById('loanChart');

    new Chart(loanChart, {
        type: 'line',
        data: {
            labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
            datasets: [{
                label: 'Loan Applications',
                data: [150, 220, 180, 260, 300, 350]
            }]
        }
    });

</script>

</body>
</html>
