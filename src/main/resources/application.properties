spring.application.name=banking-backend


# Server Configuration
server.port=8080
server.servlet.context-path=/api/v1
server.error.include-message=always
server.error.include-binding-errors=always

# Database Configuration
# Set via environment variable: DB_PASSWORD=your_password
spring.datasource.url=jdbc:postgresql://localhost:5432/bankdb
spring.datasource.username=postgres
spring.datasource.password=onoda_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
#spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.ddl-auto=validate
#spring.jpa.show-sql=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# JWT Configuration
# Set via environment variable: JWT_SECRET=your_secret
#python -c "import os,base64; print(base64.b64encode(os.urandom(32)).decode())"
jwt.secret=run_the_above_comment_in_terminal_and_paste_the_key_here
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000
jwt.issuer=DVeinBanking

# Cookie Configuration
cookie.name.refresh-token=banking_refresh_token
cookie.name.device-id=banking_device_id
cookie.secure=false
cookie.http-only=true
cookie.same-site=Lax
cookie.domain=localhost
cookie.path=/
cookie.max-age=604800

# OTP Configuration
otp.expiry=300000
otp.max-retry=3
otp.length=6
otp.resend-cooldown=60000

# Email Configuration
# Set via environment variables: MAIL_USERNAME, MAIL_PASSWORD
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=onnodagmail1234@gmail.com
spring.mail.password=onnodaapppassword
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
email.from=noreply@banking.com
email.from-name=Banking System

# Security Configuration
security.max-login-attempts=5
security.account-lock-duration=1800000
security.pre-auth-token-expiry=300000
security.password-expiry-days=90
security.password.min-length=8
security.password.require-uppercase=true
security.password.require-lowercase=true
security.password.require-digit=true
security.password.require-special-char=true
security.mpin.length=4
security.max-concurrent-sessions=3

# Encryption Configuration
# Set via environment variable: ENCRYPTION_SECRET_KEY=your_key
#python -c "import secrets; print(secrets.token_urlsafe(77)[:102])"
encryption.secret-key=run_the_above_comment_in_terminal_and_paste_the_key_here

# Session Configuration
session.max-concurrent=3
session.timeout=1800000

# Rate Limiting
# Re-enable in production (Redis-backed rate limiting recommended for multi-instance)
rate.limit.enabled=true
rate.limit.requests-per-minute=60
rate.limit.requests-per-hour=1000

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
file.upload.directory=uploads
file.upload.allowed-types=image/jpeg,image/png,application/pdf

# Account Configuration
account.number.length=12
account.ifsc-code=BANK0001234
account.branch-code=001234
account.savings.min-balance=1000
account.current.min-balance=5000

#DB Flyway manager
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Card Configuration
card.debit.number-length=16
card.credit.number-length=16
card.cvv-length=3
card.expiry-years=5
card.pin-length=4

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# Logging Configuration
logging.level.root=INFO
logging.level.com.dvein.banking_backend=DEBUG
logging.level.org.springframework.security=DEBUG
#logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.SQL=OFF
#logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.file.name=logs/banking-backend.log
logging.file.max-size=10MB
logging.file.max-history=30

# Admin Configuration
admin.default.email=admin@banking.com
# Admin seed password — set via env var ADMIN_SEED_PASSWORD
admin.seed.password=Admin@123

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ============================================
# TRANSACTION MODULE CONFIGURATION
# ============================================

# Transaction Limits (Default Values - can be overridden per customer)
transaction.limit.per-transaction=50000
transaction.limit.daily.upi=100000
transaction.limit.daily.imps=200000
transaction.limit.daily.neft=1000000
transaction.limit.daily.rtgs=5000000
transaction.limit.monthly=10000000

# Transaction Fees
transaction.fee.imps.base=5.00
transaction.fee.imps.gst=18
transaction.fee.neft.base=0.00
transaction.fee.neft.gst=0
transaction.fee.rtgs.base=30.00
transaction.fee.rtgs.gst=18
transaction.fee.upi.base=0.00
transaction.fee.upi.gst=0

# IMPS Configuration
transaction.imps.min-amount=1
transaction.imps.max-amount=200000

# NEFT Configuration
transaction.neft.min-amount=1
transaction.neft.max-amount=10000000

# RTGS Configuration
transaction.rtgs.min-amount=200000

# UPI Configuration
transaction.upi.min-amount=1
transaction.upi.max-amount=100000
transaction.upi.bank-suffix=@dveinbank
transaction.upi.pin.length=6
transaction.upi.pin.max-attempts=3
transaction.upi.pin.lock-duration=1800000

# QR Code Configuration
transaction.qr.default-expiry-hours=24
transaction.qr.max-scans=100

# Scheduled Payment Configuration
transaction.scheduled.max-retries=3
transaction.scheduled.execution-buffer-minutes=5

# External Transfer Simulation
transaction.external.delay-ms=30000

# Fraud Detection
transaction.fraud.high-value-threshold=100000
transaction.fraud.max-transactions-per-minute=5
transaction.fraud.suspicious-hour-start=0
transaction.fraud.suspicious-hour-end=5

# Background Jobs (Cron Expressions)
job.scheduled-payment.cron=0 */5 * * * ?
job.daily-limit-reset.cron=0 0 0 * * ?
job.expire-collect-requests.cron=0 0 * * * ?
job.expire-qr-codes.cron=0 0 * * * ?