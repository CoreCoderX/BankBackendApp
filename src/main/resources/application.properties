spring.application.name=banking-backend


# Server Configuration
server.port=8081
server.servlet.context-path=/api/v1
server.error.include-message=always
server.error.include-binding-errors=always

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/bankdb
spring.datasource.username=postgres
spring.datasource.password=Admin
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# JWT Configuration
jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000
jwt.issuer=banking-backend

# Cookie Configuration
cookie.name.refresh-token=banking_refresh_token
cookie.name.device-id=banking_device_id
cookie.secure=false
cookie.http-only=true
cookie.same-site=Lax
cookie.domain=localhost
cookie.path=/
cookie.max-age=604800

# OTP Configuration
otp.expiry=300000
otp.max-retry=3
otp.length=6
otp.resend-cooldown=60000

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=yashwanth4625@gmail.com
spring.mail.password=vqkconlnqtrmkadt
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
email.from=noreply@banking.com
email.from-name=Banking System

# Security Configuration
security.max-login-attempts=5
security.account-lock-duration=1800000
security.password-expiry-days=90
security.password.min-length=8
security.password.require-uppercase=true
security.password.require-lowercase=true
security.password.require-digit=true
security.password.require-special-char=true
security.mpin.length=4

# Session Configuration
session.max-concurrent=3
session.timeout=1800000

# Rate Limiting
rate.limit.enabled=false
rate.limit.requests-per-minute=60
rate.limit.requests-per-hour=1000

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
file.upload.directory=uploads
file.upload.allowed-types=image/jpeg,image/png,application/pdf

# Account Configuration
account.number.length=12
account.ifsc-code=BANK0001234
account.branch-code=001234
account.savings.min-balance=1000
account.current.min-balance=5000

# Card Configuration
card.debit.number-length=16
card.credit.number-length=16
card.cvv-length=3
card.expiry-years=5
card.pin-length=4

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# Logging Configuration
logging.level.root=INFO
logging.level.com.dvein.banking_backend=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.file.name=logs/banking-backend.log
logging.file.max-size=10MB
logging.file.max-history=30

